name: Professional Smart Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URLs (Separate with space, comma, or new line)'
        required: true
        type: string
      youtube_method:
        description: 'YouTube Download Method'
        required: true
        type: choice
        options:
          - 'Fast API (No Cookies needed - Fastest)'
          - 'yt-dlp (Reliable - Use this if you have Cookies)'
      quality:
        description: 'Video Quality (for supported extractors)'
        required: true
        type: choice
        options:
          - 'Best (Highest available)'
          - '1080p (MP4 format)'
          - '720p (MP4 format)'
          - '480p (MP4 format)'
          - '360p (MP4 format)'
          - 'Audio (MP3 format)'
      password:
        description: 'ZIP Password (Optional)'
        required: false
        type: string
        default: ''
      custom_headers:
        description: 'Custom Headers (JSON format: {"Header1": "Value1"})'
        required: false
        type: string
        default: ''
      threads:
        description: 'Download Threads (for HAD)'
        required: false
        type: number
        default: 16
      auto_retry:
        description: 'Auto retry on failure'
        required: false
        type: boolean
        default: true
      split_size:
        description: 'Split size in MB (0 = no split, only used when NOT uploading)'
        required: false
        type: number
        default: 95
      upload_to_uploadkon:
        description: 'Upload files to uploadkon.ir instead of GitHub'
        required: false
        type: boolean
        default: false
      upload_to_rubika:
        description: 'Upload files to Rubika (Saved Messages)'
        required: false
        type: boolean
        default: false
      rubika_auth_string:
        description: 'Rubika Auth String (Required if upload_to_rubika is true)'
        required: false
        type: string
        default: ''
      telegram_string_session:
        description: 'Telegram String Session (for downloading files from Telegram links)'
        required: false
        type: string
        default: ''

jobs:
  smart-download:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
      API_ID: 12345
      API_HASH: "Herer_Specter_For_Help_you"
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect URL Types
        id: detect
        shell: bash
        run: |
          RAW_URLS="${{ github.event.inputs.url }}"
          FORMATTED_URLS=$(echo "$RAW_URLS" | sed 's/[,\n]/ /g' | tr -s ' ')
          
          HAS_TELEGRAM=false
          HAS_YOUTUBE=false
          HAS_OTHER=false
          
          for URL in $FORMATTED_URLS; do
            if [ -z "$URL" ]; then
              continue
            fi
            
            if echo "$URL" | grep -qE "(t\.me|telegram\.me)"; then
              HAS_TELEGRAM=true
            elif echo "$URL" | grep -qE "(youtube\.com|youtu\.be)"; then
              HAS_YOUTUBE=true
            else
              HAS_OTHER=true
            fi
          done
          
          echo "has_telegram=$HAS_TELEGRAM" >> $GITHUB_OUTPUT
          echo "has_youtube=$HAS_YOUTUBE" >> $GITHUB_OUTPUT
          echo "has_other=$HAS_OTHER" >> $GITHUB_OUTPUT

      - name: Fast Setup
        run: |
          pip3 install requests --break-system-packages 2>/dev/null || pip3 install requests

      - name: Setup Basic Dependencies
        if: steps.detect.outputs.has_youtube == 'true' || steps.detect.outputs.has_other == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends wget curl git jq bc
          touch light_tools_installed

      - name: Setup Python Dependencies for Telegram
        if: steps.detect.outputs.has_telegram == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-pip
          pip3 install telethon asyncio requests

      - name: Setup Rubika Dependencies
        if: github.event.inputs.upload_to_rubika == 'true'
        run: |
          pip3 install rubpy --break-system-packages 2>/dev/null || pip3 install rubpy

      - name: Setup YouTube API Script
        if: steps.detect.outputs.has_youtube == 'true'
        run: |
          cat << 'EOF' > yt_api.py
          import os, sys, time, requests, re
          
          url = sys.argv[1]
          quality_input = sys.argv[2]
          outdir = sys.argv[3]
          
          def download_via_api1(url, quality_input, outdir):
              if "Audio" in quality_input:
                  payload = {'url': url, 'os': 'linux', 'output': {'type': 'audio', 'format': 'mp3'}, 'audio': {'bitrate': '320k'}}
                  ext = 'mp3'
              else:
                  q = '720p'
                  if '1080' in quality_input: q = '1080p'
                  elif '480' in quality_input: q = '480p'
                  elif '360' in quality_input: q = '360p'
                  payload = {'url': url, 'os': 'linux', 'output': {'type': 'video', 'format': 'mp4', 'quality': q}}
                  ext = 'mp4'
              
              resp = requests.post('https://hub.ytconvert.org/api/download', json=payload, headers={'User-Agent': 'Mozilla/5.0'}, timeout=15)
              if resp.status_code != 200:
                  return None
              
              status_url = resp.json().get('statusUrl')
              if not status_url:
                  return None
              
              for _ in range(60):
                  time.sleep(2)
                  s_resp = requests.get(status_url, headers={'User-Agent': 'Mozilla/5.0'}, timeout=10)
                  if s_resp.status_code == 200:
                      data = s_resp.json()
                      if data.get('status') == 'completed':
                          dl_url = data.get('downloadUrl')
                          raw_title = data.get('title', 'YouTube_Video')
                          title = re.sub(r'[\\/*?:"<>| ]', '_', raw_title)
                          if dl_url:
                              filepath = os.path.join(outdir, f"{title}.{ext}")
                              dl_req = requests.get(dl_url, stream=True, timeout=60)
                              with open(filepath, "wb") as f:
                                  for chunk in dl_req.iter_content(8192):
                                      if chunk:
                                          f.write(chunk)
                              return filepath
                      elif data.get('status') in ('failed', 'error'):
                          return None
              return None
          
          def download_via_api_fallback(url, quality_input, outdir):
              import subprocess
              if "Audio" in quality_input:
                  cmd = f"yt-dlp -x --audio-format mp3 -o '{outdir}/%(title)s.%(ext)s' '{url}'"
              else:
                  cmd = f"yt-dlp -f 'best[height<=720]' -o '{outdir}/%(title)s.%(ext)s' '{url}'"
              
              result = subprocess.run(cmd, shell=True, capture_output=True, text=True)
              if result.returncode == 0:
                  return "success"
              return None
          
          if __name__ == "__main__":
              try:
                  result = download_via_api1(url, quality_input, outdir)
                  if result:
                      print(f"Downloaded: {result}")
                      sys.exit(0)
                  
                  print("API failed, trying fallback...")
                  result = download_via_api_fallback(url, quality_input, outdir)
                  if result:
                      sys.exit(0)
                  
                  sys.exit(1)
              except Exception as e:
                  print(f"Error: {e}")
                  sys.exit(1)
          EOF

      - name: Setup Cookies for yt-dlp
        if: steps.detect.outputs.has_youtube == 'true'
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            printf "%s" "$YOUTUBE_COOKIES" > youtube_cookies.txt
            echo "YouTube cookies loaded from secret"
          else
            echo "No YouTube cookies found"
            touch youtube_cookies.txt
          fi

      - name: Headers Converter
        if: steps.detect.outputs.has_other == 'true'
        run: |
          cat << "EOF" > headers_converter.py
          import json, sys
          def json_to_had_headers(headers_json):
              if not headers_json or headers_json.strip() == '' or headers_json == '{}':
                  return []
              try:
                  headers = json.loads(headers_json)
                  return [f'-H "{k}: {v}"' for k, v in headers.items()]
              except:
                  return []
          if __name__ == "__main__":
              if len(sys.argv) > 1:
                  had_args = json_to_had_headers(sys.argv[1])
                  print(' '.join(had_args))
          EOF

      - name: Telegram Downloader Script
        if: steps.detect.outputs.has_telegram == 'true'
        run: |
          cat << 'EOF' > telegram_downloader.py
          import asyncio
          import os
          import re
          import sys
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          
          async def download_telegram_file(string_session, url, download_path):
              try:
                  api_id = int(os.environ.get('API_ID', 12345))
                  api_hash = os.environ.get('API_HASH', 'Herer_Specter_For_Help_you')
                  
                  if not string_session or string_session.strip() == '':
                      return {"error": "No Telegram string session provided"}
                  
                  client = TelegramClient(StringSession(string_session), api_id, api_hash)
                  await client.start()
                  
                  pattern = r"https?://(?:t\.me|telegram\.me)/(?:c/)?([^/]+)/(\d+)"
                  match = re.match(pattern, url)
                  
                  if not match:
                      return {"error": "Invalid Telegram link"}
                  
                  entity = match.group(1)
                  msg_id = int(match.group(2))
                  
                  if entity.isdigit():
                      entity = int(entity)
                  
                  message = await client.get_messages(entity, ids=msg_id)
                  
                  if not message or not message.media:
                      return {"error": "Message not found or has no media"}
                  
                  os.makedirs(download_path, exist_ok=True)
                  
                  file_name = None
                  if hasattr(message.file, 'name') and message.file.name:
                      file_name = message.file.name
                  else:
                      ext = ".jpg" if hasattr(message.media, 'photo') else ".file"
                      file_name = f"telegram_{msg_id}{ext}"
                  
                  file_path = os.path.join(download_path, file_name)
                  
                  download_path_result = await client.download_media(message, file=file_path)
                  
                  await client.disconnect()
                  
                  if download_path_result:
                      return {"success": True, "file_path": download_path_result, "file_name": file_name}
                  else:
                      return {"error": "Download failed"}
                  
              except Exception as e:
                  return {"error": str(e)}
          
          if __name__ == "__main__":
              if len(sys.argv) >= 4:
                  string_session = sys.argv[1]
                  url = sys.argv[2]
                  download_path = sys.argv[3]
                  
                  result = asyncio.run(download_telegram_file(string_session, url, download_path))
                  
                  if result.get("success"):
                      print(f"SUCCESS:{result['file_path']}")
                  else:
                      print(f"ERROR:{result.get('error', 'Unknown error')}")
                  sys.exit(0 if result.get("success") else 1)
              else:
                  print("ERROR: Missing arguments")
                  sys.exit(1)
          EOF

      - name: Rubika Uploader Script
        if: github.event.inputs.upload_to_rubika == 'true'
        run: |
          cat << 'EOF' > rubika_uploader.py
          import os
          import sys
          import base64
          import lzma
          from rubpy import Client as RubikaClient
          
          def decode_auth_string(auth_string):
              try:
                  compressed = base64.b64decode(auth_string)
                  decompressed = lzma.decompress(compressed)
                  return decompressed
              except Exception as e:
                  print(f"Failed to decode auth string: {e}")
                  return None
          
          def upload_to_rubika(file_path, auth_string, caption):
              if not os.path.exists(file_path):
                  print(f"ERROR:File not found: {file_path}")
                  return None
              
              rubpy_data = decode_auth_string(auth_string)
              if not rubpy_data:
                  print("ERROR:Failed to decode Rubika auth string")
                  return None
              
              with open("rubpy.rp", "wb") as f:
                  f.write(rubpy_data)
              
              print(f"Uploading to Rubika: {os.path.basename(file_path)}")
              
              try:
                  client = RubikaClient(name="rubpy")
                  client.start()
                  
                  result = client.send_document("me", file_path, caption=caption)
                  
                  client.disconnect()
                  
                  print(f"SUCCESS:Uploaded to Rubika")
                  return result
              except Exception as e:
                  print(f"ERROR:Rubika upload failed: {e}")
                  return None
          
          if __name__ == "__main__":
              if len(sys.argv) >= 4:
                  file_path = sys.argv[1]
                  auth_string = sys.argv[2]
                  caption = sys.argv[3] if len(sys.argv) > 3 else "Downloaded With HAD! Project: https://github.com/Mr-Spect3r/had"
                  
                  result = upload_to_rubika(file_path, auth_string, caption)
                  
                  if result:
                      sys.exit(0)
                  else:
                      sys.exit(1)
              else:
                  print("ERROR: Missing arguments")
                  sys.exit(1)
          EOF

      - name: Uploadkon Script
        run: |
          cat << "EOF" > uploadkon.py
          import requests, json, re, sys, os
          def upload_file_to_uploadkon(filepath):
              session = requests.Session()
              filename = os.path.basename(filepath)
              session.headers.update({
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                  "Accept": "*/*",
                  "Accept-Language": "en-US,en;q=0.9",
              })
              session.get("https://uploadkon.ir/")
              headers = {
                  "X-Requested-With": "XMLHttpRequest",
                  "Origin": "https://uploadkon.ir",
                  "Referer": "https://uploadkon.ir/",
              }
              with open(filepath, "rb") as f:
                  files = {
                      "file": (filename, f, "application/octet-stream"),
                      "submitr": (None, "1"),
                      "ajax": (None, "1"),
                  }
                  response = session.post("https://uploadkon.ir/", files=files, headers=headers)
              try:
                  data = response.json()[0]
                  if data.get("message_type") == "error":
                      return {"error": data.get("i", "Unknown error")}
                  else:
                      links = re.findall(r'https?://[^\s<>"]+', data["message_content"])
                      if links:
                          return {"download_link": links[0], "delete_link": links[2] if len(links) > 2 else "Not found"}
                      else:
                          return {"error": "No links found"}
              except:
                  return {"error": "Failed to parse response"}
          if __name__ == "__main__":
              if len(sys.argv) > 1:
                  print(json.dumps(upload_file_to_uploadkon(sys.argv[1])))
          EOF

      - name: Install Heavy Tools
        if: steps.detect.outputs.has_youtube == 'true' || steps.detect.outputs.has_other == 'true'
        run: |
          YT_METHOD="${{ github.event.inputs.youtube_method }}"
          
          if [[ "$YT_METHOD" == *"yt-dlp"* ]] || [ "${{ steps.detect.outputs.has_youtube }}" = "true" ]; then
            echo "Installing yt-dlp and dependencies..."
            sudo apt-get install -y --no-install-recommends aria2 ffmpeg
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
            curl -fsSL https://bun.com/install | bash
            echo "$HOME/.bun/bin" >> $GITHUB_PATH
          fi
          
          if [ "${{ steps.detect.outputs.has_other }}" = "true" ]; then
            wget -q https://go.dev/dl/go1.21.5.linux-amd64.tar.gz
            sudo tar -C /usr/local -xzf go1.21.5.linux-amd64.tar.gz
            echo "/usr/local/go/bin" >> $GITHUB_PATH
            export PATH=$PATH:/usr/local/go/bin:$HOME/go/bin
            go install github.com/Mr-Spect3r/had@3.2.5
            echo "$HOME/go/bin" >> $GITHUB_PATH
          fi

      - name: Intelligent Download Manager
        shell: bash
        run: |
          RAW_URLS="${{ github.event.inputs.url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          YT_METHOD="${{ github.event.inputs.youtube_method }}"
          CUSTOM_HEADERS="${{ github.event.inputs.custom_headers }}"
          THREADS="${{ github.event.inputs.threads }}"
          AUTO_RETRY="${{ github.event.inputs.auto_retry }}"
          TELEGRAM_STRING_SESSION="${{ github.event.inputs.telegram_string_session }}"
          
          FORMATTED_URLS=$(echo "$RAW_URLS" | sed 's/[,\n]/ /g' | tr -s ' ')
          
          rm -rf tmp_downloads
          mkdir -p tmp_downloads dl
          
          HAD_HEADERS=""
          if [ "${{ steps.detect.outputs.has_other }}" = "true" ]; then
            HAD_HEADERS=$(python3 headers_converter.py "$CUSTOM_HEADERS")
          fi
          
          RETRY_FLAG=""
          if [ "$AUTO_RETRY" = "true" ]; then
            RETRY_FLAG="--retry 3"
          fi
          
          for URL in $FORMATTED_URLS; do
            if [ -z "$URL" ]; then
              continue
            fi
            
            echo "Processing URL: $URL"
            
            if echo "$URL" | grep -qE "(youtube\.com|youtu\.be)"; then
              if [[ "$YT_METHOD" == *"Fast API"* ]]; then
                echo "Using Fast API method..."
                if python3 yt_api.py "$URL" "$QUALITY" "tmp_downloads"; then
                  echo "Downloaded via Fast API"
                else
                  echo "Fast API failed, falling back to yt-dlp..."
                  if ! command -v yt-dlp &> /dev/null; then
                    sudo apt-get install -y ffmpeg
                    sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
                    sudo chmod a+rx /usr/local/bin/yt-dlp
                    curl -fsSL https://bun.com/install | bash
                    export PATH="$HOME/.bun/bin:$PATH"
                  fi
                  
                  COOKIE_ARG=""
                  [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"
                  
                  if [[ "$QUALITY" == *"Audio"* ]]; then
                    yt-dlp $RETRY_FLAG $COOKIE_ARG -x --audio-format mp3 -o "tmp_downloads/%(title)s.%(ext)s" "$URL"
                  else
                    yt-dlp $RETRY_FLAG $COOKIE_ARG -f "best[height<=720]/best" -o "tmp_downloads/%(title)s.%(ext)s" "$URL"
                  fi
                fi
              else
                echo "Using yt-dlp method..."
                if ! command -v yt-dlp &> /dev/null; then
                  sudo apt-get install -y ffmpeg
                  sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
                  sudo chmod a+rx /usr/local/bin/yt-dlp
                  curl -fsSL https://bun.com/install | bash
                  export PATH="$HOME/.bun/bin:$PATH"
                fi
                
                COOKIE_ARG=""
                [ -s youtube_cookies.txt ] && COOKIE_ARG="--cookies youtube_cookies.txt"
                
                if [[ "$QUALITY" == *"1080p"* ]]; then
                  YT_F="-f bestvideo[height<=1080]+bestaudio/best[height<=1080]"
                elif [[ "$QUALITY" == *"720p"* ]]; then
                  YT_F="-f bestvideo[height<=720]+bestaudio/best[height<=720]"
                elif [[ "$QUALITY" == *"480p"* ]]; then
                  YT_F="-f bestvideo[height<=480]+bestaudio/best[height<=480]"
                elif [[ "$QUALITY" == *"360p"* ]]; then
                  YT_F="-f bestvideo[height<=360]+bestaudio/best[height<=360]"
                elif [[ "$QUALITY" == *"Audio"* ]]; then
                  YT_F="-x --audio-format mp3"
                else
                  YT_F="-f bestvideo+bestaudio/best"
                fi
                
                yt-dlp $RETRY_FLAG --js-runtimes bun:$HOME/.bun/bin/bun $COOKIE_ARG $YT_F --merge-output-format mp4 -o "tmp_downloads/%(title)s.%(ext)s" "$URL"
              fi
            elif echo "$URL" | grep -qE "(t\.me|telegram\.me)"; then
              echo "Telegram link detected..."
              if [ -n "$TELEGRAM_STRING_SESSION" ] && [ "$TELEGRAM_STRING_SESSION" != "" ]; then
                RESULT=$(python3 telegram_downloader.py "$TELEGRAM_STRING_SESSION" "$URL" "tmp_downloads")
                if echo "$RESULT" | grep -q "^SUCCESS:"; then
                  FILE_PATH=$(echo "$RESULT" | sed 's/^SUCCESS://')
                  echo "Telegram file downloaded: $FILE_PATH"
                else
                  ERROR_MSG=$(echo "$RESULT" | sed 's/^ERROR://')
                  echo "Failed to download Telegram file: $ERROR_MSG"
                fi
              else
                echo "No Telegram string session provided. Skipping Telegram download."
              fi
            else
              if [ "${{ steps.detect.outputs.has_other }}" = "true" ]; then
                cd tmp_downloads
                HAD_CMD="had -t $THREADS"
                if [ -n "$HAD_HEADERS" ]; then
                  HAD_CMD="$HAD_CMD $HAD_HEADERS"
                fi
                HAD_CMD="$HAD_CMD \"$URL\""
                eval $HAD_CMD || true
                cd ..
              else
                echo "Skipping URL: $URL"
              fi
            fi
          done
          
          echo "Files in tmp_downloads:"
          ls -la tmp_downloads/

      - name: Process Files (Compress or Direct Upload)
        shell: bash
        run: |
          UPLOAD_TO_UPLOADKON="${{ github.event.inputs.upload_to_uploadkon }}"
          UPLOAD_TO_RUBIKA="${{ github.event.inputs.upload_to_rubika }}"
          HAS_PASS="${{ github.event.inputs.password }}"
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          RUBIKA_AUTH_STRING="${{ github.event.inputs.rubika_auth_string }}"
          
          # Check if ANY upload method is selected
          if [ "$UPLOAD_TO_UPLOADKON" = "true" ] || [ "$UPLOAD_TO_RUBIKA" = "true" ]; then
            echo "========================================="
            echo "Upload mode detected - Direct upload without compression"
            echo "========================================="
            
            # Direct upload mode - NO compression, NO splitting, NO pushing to GitHub
            
            if [ "$UPLOAD_TO_RUBIKA" = "true" ]; then
              if [ -z "$RUBIKA_AUTH_STRING" ] || [ "$RUBIKA_AUTH_STRING" = "" ]; then
                echo "ERROR: Rubika auth string is required when upload_to_rubika is true"
                exit 1
              fi
              
              echo "Uploading files directly to Rubika..."
              rm -f rubika_uploaded.txt
              touch rubika_uploaded.txt
              
              for FILE in tmp_downloads/*; do
                if [ ! -f "$FILE" ]; then
                  continue
                fi
                
                FILENAME=$(basename "$FILE")
                echo "Uploading to Rubika: $FILENAME"
                CAPTION="Downloaded File: $FILENAME\nProject: https://github.com/Mr-Spect3r/had"
                python3 rubika_uploader.py "$FILE" "$RUBIKA_AUTH_STRING" "$CAPTION"
                if [ $? -eq 0 ]; then
                  echo "${FILENAME}|UPLOADED_TO_RUBIKA" >> rubika_uploaded.txt
                  rm -f "$FILE"
                else
                  echo "${FILENAME}|RUBIKA_UPLOAD_FAILED" >> rubika_uploaded.txt
                fi
              done
              
              # Generate simple report
              echo "# Upload Report" > Links.md
              echo "" >> Links.md
              echo "**Upload Time:** $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M:%S') (IRST)" >> Links.md
              echo "" >> Links.md
              echo "## Rubika Upload Results" >> Links.md
              echo "" >> Links.md
              
              while IFS= read -r LINE; do
                if [ -z "$LINE" ]; then
                  continue
                fi
                FILENAME=$(echo "$LINE" | cut -d'|' -f1)
                STATUS=$(echo "$LINE" | cut -d'|' -f2)
                
                if [ "$STATUS" = "UPLOADED_TO_RUBIKA" ]; then
                  echo "- ✅ **$FILENAME** - Uploaded to Rubika (Saved in Saved Messages)" >> Links.md
                else
                  echo "- ❌ **$FILENAME** - Upload failed" >> Links.md
                fi
              done < rubika_uploaded.txt
              
              rm -f rubika_uploaded.txt
              
            elif [ "$UPLOAD_TO_UPLOADKON" = "true" ]; then
              echo "Uploading files directly to uploadkon.ir..."
              rm -f uploaded_files.txt
              touch uploaded_files.txt
              
              for FILE in tmp_downloads/*; do
                if [ ! -f "$FILE" ]; then
                  continue
                fi
                
                FILENAME=$(basename "$FILE")
                echo "Uploading: $FILENAME"
                RESULT=$(python3 uploadkon.py "$FILE")
                DOWNLOAD_LINK=$(echo "$RESULT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('download_link', ''))")
                DELETE_LINK=$(echo "$RESULT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('delete_link', ''))")
                
                if [ -n "$DOWNLOAD_LINK" ] && [ "$DOWNLOAD_LINK" != "None" ]; then
                  echo "${FILENAME}|${DOWNLOAD_LINK}|${DELETE_LINK}" >> uploaded_files.txt
                  rm -f "$FILE"
                else
                  echo "${FILENAME}|ERROR|" >> uploaded_files.txt
                fi
              done
              
              # Generate links report
              echo "# Download Links" > Links.md
              echo "" >> Links.md
              echo "**Upload Time:** $(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M:%S') (IRST)" >> Links.md
              echo "" >> Links.md
              echo "---" >> Links.md
              echo "" >> Links.md
              echo "## File Links" >> Links.md
              echo "" >> Links.md
              
              while IFS= read -r LINE; do
                if [ -z "$LINE" ]; then
                  continue
                fi
                FILENAME=$(echo "$LINE" | cut -d'|' -f1)
                DOWNLOAD_LINK=$(echo "$LINE" | cut -d'|' -f2)
                DELETE_LINK=$(echo "$LINE" | cut -d'|' -f3)
                
                if [ "$DOWNLOAD_LINK" != "ERROR" ] && [ "$DOWNLOAD_LINK" != "" ]; then
                  DISPLAY_NAME=$(echo "$FILENAME" | sed 's/[_\-\.]/ /g')
                  echo "- **$DISPLAY_NAME** - [Download]($DOWNLOAD_LINK) | [Delete]($DELETE_LINK)" >> Links.md
                fi
              done < uploaded_files.txt
              
              rm -f uploaded_files.txt
            fi
            
            # Clean up temp directory
            rm -rf tmp_downloads
            
          else
            echo "========================================="
            echo "GitHub storage mode - Compress, split and push to GitHub"
            echo "========================================="
            
            # GitHub storage mode - Compress and split files
            
            if [ -z "$SPLIT_SIZE" ] || [ "$SPLIT_SIZE" -eq 0 ]; then
              LIMIT=999999999
              SPLIT_ARG=""
            else
              LIMIT=$((SPLIT_SIZE * 1024 * 1024))
              SPLIT_ARG="-s ${SPLIT_SIZE}m"
            fi
            
            rm -f files_to_process.txt
            
            if [ ! -d "tmp_downloads" ]; then
              echo "tmp_downloads directory not found"
              exit 0
            fi
            
            for FILE in tmp_downloads/*; do
              if [ ! -f "$FILE" ]; then
                continue
              fi
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              SAFE_NAME=$(echo "$BASENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
              
              rm -f "dl/${SAFE_NAME}".* 2>/dev/null
              
              if [ -n "$HAS_PASS" ] || [ "$SIZE" -gt "$LIMIT" ]; then
                PASS_ARG=""
                if [ -n "$HAS_PASS" ]; then
                  PASS_ARG="-P $HAS_PASS"
                fi
                zip $PASS_ARG $SPLIT_ARG "dl/${SAFE_NAME}.zip" -j "$FILE" > /dev/null 2>&1
                
                for ZPART in "dl/${SAFE_NAME}.zip" "dl/${SAFE_NAME}".z[0-9]*; do
                  if [ -f "$ZPART" ]; then
                    basename "$ZPART" >> files_to_process.txt
                  fi
                done
              else
                cp -f "$FILE" "dl/$SAFE_NAME"
                echo "$SAFE_NAME" >> files_to_process.txt
              fi
            done
            
            rm -rf tmp_downloads
            
            # Generate links for GitHub files
            if [ -s files_to_process.txt ]; then
              REPO="${{ github.repository }}"
              BRANCH="${GITHUB_REF_NAME}"
              RUN_ID="${{ github.run_id }}"
              TOTAL_FILES=$(cat files_to_process.txt | wc -l)
              CURRENT_DATE=$(TZ='Asia/Tehran' date +'%Y-%m-%d %H:%M:%S')
              
              echo "# Download Links" > Links.md
              echo "" >> Links.md
              echo "**Last Updated:** $CURRENT_DATE (IRST)" >> Links.md
              echo "" >> Links.md
              echo "---" >> Links.md
              echo "" >> Links.md
              echo "## Statistics" >> Links.md
              echo "" >> Links.md
              echo "| Metric | Value |" >> Links.md
              echo "|--------|-------|" >> Links.md
              echo "| Total Files | $TOTAL_FILES |" >> Links.md
              echo "| Repository | $REPO |" >> Links.md
              echo "| Branch | $BRANCH |" >> Links.md
              echo "| Run ID | $RUN_ID |" >> Links.md
              echo "" >> Links.md
              echo "---" >> Links.md
              echo "" >> Links.md
              echo "## Download List" >> Links.md
              echo "" >> Links.md
              
              while IFS= read -r FILENAME; do
                if [ -z "$FILENAME" ]; then
                  continue
                fi
                
                DOWNLOAD_LINK="https://github.com/$REPO/raw/$BRANCH/dl/$FILENAME"
                DISPLAY_NAME=$(echo "$FILENAME" | sed 's/\.zip$//; s/\.z[0-9]\+$//; s/[_\-\.]/ /g')
                
                if [ -f "dl/$FILENAME" ]; then
                  SIZE_BYTES=$(stat -c%s "dl/$FILENAME" 2>/dev/null || echo 0)
                  if [ $SIZE_BYTES -ge 1073741824 ]; then
                    SIZE_VALUE=$(echo "scale=2; $SIZE_BYTES/1073741824" | bc)
                    SIZE_STR="${SIZE_VALUE} GB"
                  elif [ $SIZE_BYTES -ge 1048576 ]; then
                    SIZE_VALUE=$(echo "scale=1; $SIZE_BYTES/1048576" | bc)
                    SIZE_STR="${SIZE_VALUE} MB"
                  else
                    if [ $SIZE_BYTES -gt 0 ]; then
                      SIZE_VALUE=$((SIZE_BYTES/1024))
                      SIZE_STR="${SIZE_VALUE} KB"
                    else
                      SIZE_STR="Unknown"
                    fi
                  fi
                else
                  SIZE_STR="Unknown"
                fi
                
                echo "- **$DISPLAY_NAME** - [Download]($DOWNLOAD_LINK) - Size: $SIZE_STR" >> Links.md
                echo "" >> Links.md
              done < files_to_process.txt
              
              rm -f files_to_process.txt
            fi
          fi

      - name: Push to Repository (Only when NOT uploading)
        if: github.event.inputs.upload_to_uploadkon == 'false' && github.event.inputs.upload_to_rubika == 'false'
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "Downloader Bot"
          git config user.email "actions@github.com"
          git add dl/ Links.md
          git status
          git commit -m "Add downloaded files [skip ci]" || echo "No changes to commit"
          git push origin HEAD:$BRANCH || echo "Push failed"
